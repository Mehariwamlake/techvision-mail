services:
  mariadb:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: always

  frappe:
    image: frappe/erpnext:version-15
    restart: always
    depends_on:
      - mariadb
      - redis
    environment:
      DB_HOST: mariadb
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  scheduler:
    image: frappe/erpnext:version-15
    command: bench schedule
    restart: always
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  queue-default:
    image: frappe/erpnext:version-15
    command: bench worker --queue default
    restart: always
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  queue-long:
    image: frappe/erpnext:version-15
    command: bench worker --queue long
    restart: always
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  socketio:
    image: frappe/erpnext:version-15
    command: node apps/frappe/socketio.js
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frappe

volumes:
  mariadb-data:
  sites:
  logs: