version: "3.8"

name: techvision-mail

services:

  # -------------------------
  # DATABASE
  # -------------------------
  mariadb:
    image: mariadb:10.11
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - frappe-net


  # -------------------------
  # REDIS (3 instances)
  # -------------------------
  redis-cache:
    image: redis:7-alpine
    restart: always
    networks:
      - frappe-net

  redis-queue:
    image: redis:7-alpine
    restart: always
    networks:
      - frappe-net

  redis-socketio:
    image: redis:7-alpine
    restart: always
    networks:
      - frappe-net


  # -------------------------
  # INIT (RUNS ONCE)
  # -------------------------
  init:
    image: frappe/erpnext:v16
    restart: "no"
    entrypoint: bash
    command: >
      -c "
      echo '⏳ Waiting for DB...';
      sleep 10;

      if [ ! -d sites/mail.techvision.edu.et ]; then
        echo '🚀 Creating site...';

        bench new-site mail.techvision.edu.et \
          --mariadb-root-password ${DB_ROOT_PASSWORD} \
          --admin-password ${ADMIN_PASSWORD} \
          --no-mariadb-socket;

        bench --site mail.techvision.edu.et install-app mail;
      fi;

      echo '🔧 Configuring Redis...';

      bench set-config -g redis_cache ${REDIS_CACHE};
      bench set-config -g redis_queue ${REDIS_QUEUE};
      bench set-config -g redis_socketio ${REDIS_SOCKETIO};

      bench --site mail.techvision.edu.et migrate;
      "
    env_file:
      - .env
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue
      - redis-socketio
    networks:
      - frappe-net


  # -------------------------
  # BACKEND (GUNICORN)
  # -------------------------
  backend:
    image: frappe/erpnext:v16
    restart: always
    command: >
      bash -c "
        bench use mail.techvision.edu.et &&
        gunicorn -b 0.0.0.0:8000 frappe.app:application --workers 2 --threads 4
      "
    env_file:
      - .env
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      - init
    networks:
      - frappe-net


  # -------------------------
  # SOCKET.IO (REALTIME)
  # -------------------------
  socketio:
    image: frappe/erpnext:v16
    restart: always
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      REDIS_SOCKETIO: ${REDIS_SOCKETIO}
    depends_on:
      - redis-socketio
      - backend
    networks:
      - frappe-net


  # -------------------------
  # WORKERS
  # -------------------------
  worker-default:
    image: frappe/erpnext:v16
    restart: always
    command: bench worker --queue default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
    networks:
      - frappe-net

  worker-short:
    image: frappe/erpnext:v16
    restart: always
    command: bench worker --queue short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
    networks:
      - frappe-net

  worker-long:
    image: frappe/erpnext:v16
    restart: always
    command: bench worker --queue long
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
    networks:
      - frappe-net


  # -------------------------
  # SCHEDULER
  # -------------------------
  scheduler:
    image: frappe/erpnext:v16
    restart: always
    command: bench schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
    networks:
      - frappe-net


  # -------------------------
  # NGINX (REVERSE PROXY)
  # -------------------------
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - socketio
    networks:
      - frappe-net


# -------------------------
# VOLUMES
# -------------------------
volumes:
  mariadb-data:
  sites:
  logs:


# -------------------------
# NETWORK
# -------------------------
networks:
  frappe-net:
    driver: bridge