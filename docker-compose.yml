services:
  backend:
    image: ghcr.io/mehariwamlake/mail:6fc7789b69f8d588ed01dfee6cfcc90829e9c4d9
    restart: always
    working_dir: /home/frappe/frappe-bench
    networks:
      - frappe_network
    command: ["bench", "start"]
    depends_on:
      - db
      - redis-cache
      - redis-queue
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    expose:
      - "8000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
  configurator:
    user: root
    entrypoint: ["bash", "-lc"]
    image: ghcr.io/mehariwamlake/mail:6fc7789b69f8d588ed01dfee6cfcc90829e9c4d9
    working_dir: /home/frappe/frappe-bench
    command: >
      set -e;

      mkdir -p sites;

      if [ -d apps ]; then
        ls -1 apps > sites/apps.txt;
      else
        echo "frappe" > sites/apps.txt;
      fi;


      bench set-config -g db_host \"$DB_HOST\";
      bench set-config -gp db_port \"$DB_PORT\";
      bench set-config -g redis_cache \"redis://$REDIS_CACHE\";
      bench set-config -g redis_queue \"redis://$REDIS_QUEUE\";
      bench set-config -g redis_socketio \"redis://$REDIS_QUEUE\";
      bench set-config -gp socketio_port \"$SOCKETIO_PORT\";"_QUEUE\";
      bench set-config -gp socketio_port \"$SOCKETIO_PORT\";"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_CACHE: ${REDIS_CACHE}
      REDIS_QUEUE: ${REDIS_QUEUE}
      SOCKETIO_PORT: ${SOCKETIO_PORT}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs


  create-site:
    user: root
    entrypoint: ["bash", "-lc"]
    image: ghcr.io/mehariwamlake/mail:6fc7789b69f8d588ed01dfee6cfcc90829e9c4d9
    working_dir: /home/frappe/frappe-bench
    command: >
      "set -e;

      start=$(date +%s);

      until [[ -n \"$(jq -r '.db_host // empty' sites/common_site_config.json)\" ]] &&
            [[ -n \"$(jq -r '.redis_cache // empty' sites/common_site_config.json)\" ]] &&
            [[ -n \"$(jq -r '.redis_queue // empty' sites/common_site_config.json)\" ]];
      do
        echo 'Waiting for config...';
        sleep 5;

        if (( $(date +%s) - start > 120 )); then
          echo 'Config not found';
          exit 1;
        fi
      done;

      bench new-site \
        --mariadb-user-host-login-scope='%' \
        --admin-password=\"$ADMIN_PASSWORD\" \
        --db-root-username=root \
        --db-root-password=\"$MYSQL_ROOT_PASSWORD\" \
        --install-app erpnext \
        --install-app mail \
        --set-default \"$SITE_NAME\";"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
  db:
    image: mariadb:10.8
    restart: always
    networks:
      - frappe_network
    healthcheck:
      test: mysqladmin ping -h localhost --password=${MYSQL_ROOT_PASSWORD}
      interval: 5s
      retries: 20
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql

  frontend:
    image: ghcr.io/mehariwamlake/mail:6fc7789b69f8d588ed01dfee6cfcc90829e9c4d9
    restart: always
    depends_on:
      - websocket
      - backend
    working_dir: /home/frappe/frappe-bench
    networks:
      - frappe_network
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: ${BACKEND}
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER}
      SOCKETIO: websocket:${SOCKETIO_PORT}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    ports:
      - "8080:8080"

  queue-long:
    image: ghcr.io/mehariwamlake/mail:6fc7789b69f8d588ed01dfee6cfcc90829e9c4d9
    restart: always
    working_dir: /home/frappe/frappe-bench
    networks:
      - frappe_network
    command: ["bench", "worker", "--queue", "long,default,short"]
    depends_on:
      - redis-cache
      - redis-queue
    environment:
      FRAPPE_REDIS_CACHE: redis://${REDIS_CACHE}
      FRAPPE_REDIS_QUEUE: redis://${REDIS_QUEUE}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  queue-short:
    image: ghcr.io/mehariwamlake/mail:6fc7789b69f8d588ed01dfee6cfcc90829e9c4d9
    restart: always
    working_dir: /home/frappe/frappe-bench
    networks:
      - frappe_network
    command: ["bench", "worker", "--queue", "short,default"]
    depends_on:
      - redis-cache
      - redis-queue
    environment:
      FRAPPE_REDIS_CACHE: redis://${REDIS_CACHE}
      FRAPPE_REDIS_QUEUE: redis://${REDIS_QUEUE}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
  redis-cache:
    image: redis:6.2-alpine
    restart: always
    networks:
      - frappe_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 10

  redis-queue:
    image: redis:6.2-alpine
    restart: always
    networks:
      - frappe_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 10
  scheduler:
    image: ghcr.io/mehariwamlake/mail:6fc7789b69f8d588ed01dfee6cfcc90829e9c4d9
    restart: always
    working_dir: /home/frappe/frappe-bench
    networks:
      - frappe_network
    command: ["bench", "schedule"]
    depends_on:
      - redis-cache
      - redis-queue
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  websocket:
    image: ghcr.io/mehariwamlake/mail:6fc7789b69f8d588ed01dfee6cfcc90829e9c4d9
    restart: always
    depends_on:
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    networks:
      - frappe_network
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    environment:
      FRAPPE_REDIS_CACHE: redis://${REDIS_CACHE}
      FRAPPE_REDIS_QUEUE: redis://${REDIS_QUEUE}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:

networks:
  frappe_network:
    driver: bridge
    name: frappe_network


    