name: techvision-mail

services:

  backend:
    image: frappe/erpnext:version-15
    command: bash -c "
      if [ ! -f /home/frappe/frappe-bench/Procfile ]; then
        echo '🔧 Initializing bench...';
        cd /home/frappe;
        bench init frappe-bench --skip-redis-config-generation;
      fi;

      cd /home/frappe/frappe-bench;
      bench start;
    "
    env_file:
      - .env
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue
      - redis-socketio
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    labels:
      - traefik.enable=true
      - traefik.http.routers.erp.rule=Host(`${SITE_NAME}`)
      - traefik.http.routers.erp.entrypoints=websecure
      - traefik.http.routers.erp.tls.certresolver=letsencrypt
      - traefik.http.services.erp.loadbalancer.server.port=8000

  init:
    image: frappe/erpnext:version-15
    command: bash -c "
      sleep 25;

      cd /home/frappe/frappe-bench || true;

      if [ ! -d sites/$SITE_NAME ]; then
        echo '🚀 Creating site...';

        bench set-config -g db_host $DB_HOST;
        bench set-config -g redis_cache redis://$REDIS_CACHE;
        bench set-config -g redis_queue redis://$REDIS_QUEUE;
        bench set-config -g redis_socketio redis://$REDIS_SOCKETIO;

        bench new-site $SITE_NAME \
          --admin-password $ADMIN_PASSWORD \
          --mariadb-root-password $MYSQL_ROOT_PASSWORD;

        echo '📦 Installing Mail app...';
        bench get-app https://github.com/frappe/mail;

        bench --site $SITE_NAME install-app mail;
        bench --site $SITE_NAME migrate;
      else
        echo '✅ Site already exists';
      fi
    "
    env_file:
      - .env
    depends_on:
      - mariadb
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  scheduler:
    image: frappe/erpnext:version-15
    command: bench schedule
    env_file:
      - .env
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  worker-default:
    image: frappe/erpnext:version-15
    command: bench worker --queue default
    env_file:
      - .env
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  worker-long:
    image: frappe/erpnext:version-15
    command: bench worker --queue long
    env_file:
      - .env
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  socketio:
    image: frappe/erpnext:version-15
    command: node apps/frappe/socketio.js
    env_file:
      - .env
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  mariadb:
    image: mariadb:10.11
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql

  redis-cache:
    image: redis:7-alpine

  redis-queue:
    image: redis:7-alpine

  redis-socketio:
    image: redis:7-alpine

volumes:
  sites:
  mariadb-data: