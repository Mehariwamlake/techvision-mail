version: "3.8"

services:

  backend:
    image: ${FRAPPE_IMAGE}
    container_name: frappe-backend
    restart: unless-stopped

    depends_on:
      - db
      - redis-cache
      - redis-queue
      - redis-socketio

    ports:
      - "8000:8000"

    working_dir: /home/frappe/frappe-bench

    command: >
      bash -lc "bench serve --port 8000"

    environment:
      SITE_NAME: ${SITE_NAME}
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379

    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs


  socketio:
    image: ${FRAPPE_IMAGE}
    container_name: frappe-socketio
    restart: unless-stopped

    working_dir: /home/frappe/frappe-bench

    command: node apps/frappe/socketio.js

    environment:
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379

    ports:
      - "9000:9000"

    depends_on:
      - redis-socketio

  # ----------------------------
  # SITE CREATION (IMPORTANT FIX)
  # ----------------------------
  site-setup:
    image: ${FRAPPE_IMAGE}
    container_name: frappe-site-setup
    restart: "no"

    working_dir: /home/frappe/frappe-bench

    depends_on:
      - db

    command: >
      wait-for-it -t 120 db:3306;
      wait-for-it -t 120 redis-cache:6379;
      wait-for-it -t 120 redis-queue:6379;
      export start=`date +%s`;
      until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] &&
        [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] &&
        [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
      do
        echo "Waiting for config...";
        sleep 5;
        if (( `date +%s`-start > 120 )); then
          echo "Config not found";
          exit 1
        fi
      done;
      bench new-site \
        --mariadb-user-host-login-scope='%' \
        --admin-password=${ADMIN_PASSWORD} \
        --db-root-username=root \
        --db-root-password=${MYSQL_ROOT_PASSWORD} \
        --install-app erpnext \
        --install-app mail \
        --set-default ${SITE_NAME};


  db:
    image: mariadb:10.6

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-log-bin

  redis-cache:
    image: redis:7-alpine
    container_name: frappe-redis-cache
    restart: unless-stopped


  redis-queue:
    image: redis:7-alpine
    container_name: frappe-redis-queue
    restart: unless-stopped


  redis-socketio:
    image: redis:7-alpine
    container_name: frappe-redis-socketio
    restart: unless-stopped


  worker-default:
    image: ${FRAPPE_IMAGE}
    command: bench worker --queue default
    working_dir: /home/frappe/frappe-bench
    restart: unless-stopped

    depends_on:
      - redis-queue
      - db

    volumes:
      - sites:/home/frappe/frappe-bench/sites


  worker-short:
    image: ${FRAPPE_IMAGE}
    command: bench worker --queue short
    working_dir: /home/frappe/frappe-bench
    restart: unless-stopped

    depends_on:
      - redis-queue
      - db

    volumes:
      - sites:/home/frappe/frappe-bench/sites


  scheduler:
    image: ${FRAPPE_IMAGE}
    command: bench schedule
    working_dir: /home/frappe/frappe-bench
    restart: unless-stopped

    depends_on:
      - db
      - redis-queue

    volumes:
      - sites:/home/frappe/frappe-bench/sites


volumes:
  sites:
  logs:
  db-data: