version: "3.8"

name: techvision-mail

services:

  # -------------------------
  # DATABASE
  # -------------------------
  mariadb:
    image: mariadb:10.8
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - frappe-net

  # -------------------------
  # REDIS (3 instances)
  # -------------------------
  redis-cache:
    image: redis:7-alpine
    restart: always
    networks:
      - frappe-net

  redis-queue:
    image: redis:7-alpine
    restart: always
    networks:
      - frappe-net

  redis-socketio:
    image: redis:7-alpine
    restart: always
    networks:
      - frappe-net

  # -------------------------
  # INIT (RUNS ONCE)
  # -------------------------
  init:
    image: frappe/erpnext:v16
    restart: "no"
    working_dir: /home/frappe/frappe-bench
    entrypoint: bash
    environment:
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379
    command: >
      -c '
      set -e;

      echo "⏳ Waiting for MariaDB...";
      until mysqladmin ping -h mariadb --silent; do
        echo "Waiting DB...";
        sleep 2;
      done;

      echo "✅ MariaDB ready";

      echo "🔧 Setting Redis FIRST (important)";
      
      bench set-config -g redis_cache "$REDIS_CACHE";
      bench set-config -g redis_queue "$REDIS_QUEUE";
      bench set-config -g redis_socketio "$REDIS_SOCKETIO";

      echo "🚀 Creating site (if not exists)";
      if [ ! -d sites/mail.techvision.edu.et ]; then

        bench new-site mail.techvision.edu.et \
          --db-host mariadb \
          --db-port 3306 \
          --mariadb-root-password "$DB_ROOT_PASSWORD" \
          --admin-password "$ADMIN_PASSWORD" \
          --force || exit 1;

        echo "📦 Installing apps";

        bench get-app mail https://github.com/Mehariwamlake/mail.git;
        bench --site mail.techvision.edu.et install-app mail;
        bench use mail.techvision.edu.et

      else
        echo "✅ Site already exists";
      fi;

      echo "⚙️ Migrating site";
      bench --site mail.techvision.edu.et migrate;

      echo "🧹 Clearing cache";
      bench --site mail.techvision.edu.et clear-cache;
      bench --site mail.techvision.edu.et clear-website-cache;

      echo "✅ INIT COMPLETE";
      '
    env_file:
      - .env
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue
      - redis-socketio
    networks:
      - frappe-net

  # -------------------------
  # BACKEND (GUNICORN)
  # -------------------------
  backend:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: bench start
    volumes:
      - frappe-bench:/home/frappe/frappe-bench

    depends_on:
      - init
    networks:
      - frappe-net


  # -------------------------
  # FRONTEND BUILDER (NODE 18 FIXED)
  # -------------------------
  mail-frontend-builder:
    image: node:18-bullseye
    working_dir: /app
    volumes:
      - ./apps/mail:/app
    command: >
      bash -c "
        corepack enable &&
        yarn install &&
        yarn build
      "
    networks:
      - frappe-net
    profiles: ["build"]


  # -------------------------
  # SOCKET.IO (REALTIME)
  # -------------------------
  socketio:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: socketio
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
    networks:
      - frappe-net

  # -------------------------
  # WORKERS
  # -------------------------
  worker-default:
    image: frappe/erpnext:v16
    working_dir: /home/frappe/frappe-bench
    restart: always
    command: bench worker --queue default
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
    depends_on:
      - backend
    networks:
      - frappe-net

  worker-short:
    image: frappe/erpnext:v16
    working_dir: /home/frappe/frappe-bench
    restart: always
    command: bench worker --queue short
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
    depends_on:
      - backend
    networks:
      - frappe-net

  worker-long:
    image: frappe/erpnext:v16
    working_dir: /home/frappe/frappe-bench
    restart: always
    command: bench worker --queue long
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
    depends_on:
      - backend
    networks:
      - frappe-net

  # -------------------------
  # SCHEDULER
  # -------------------------
  scheduler:
    image: frappe/erpnext:v16
    restart: always
    command: bench schedule
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
    depends_on:
      - backend
    networks:
      - frappe-net

  # -------------------------
  # NGINX (REVERSE PROXY)
  # -------------------------
 

# -------------------------
# VOLUMES
# -------------------------
volumes:
  mariadb-data:
  frappe-bench:

    # -------------------------
    # NETWORK
    # -------------------------
networks:
  frappe-net:
    driver: bridge
