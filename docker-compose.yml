version: "3.8"

services:
  backend:
    image: ghcr.io/mehariwamlake/mail:79a17d7c3a12956d4382a496513034d2bba5e42c
    container_name: frappe-backend
    restart: unless-stopped

    depends_on:
      - db
      - redis-cache
      - redis-queue
      - redis-socketio

    ports:
      - "8000:8000"

    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379
      SITE_NAME: site1.local
      INSTALL_APPS: erpnext,mail

    working_dir: /home/frappe/frappe-bench

    command: bash -lc "bench start"

    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  db:
    image: mariadb:10.6
    container_name: frappe-db
    restart: unless-stopped

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-log-bin

    environment:
      MYSQL_ROOT_PASSWORD: frappe
      MYSQL_DATABASE: frappe

    volumes:
      - db-data:/var/lib/mysql

  redis-cache:
    image: redis:7-alpine
    container_name: frappe-redis-cache
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    container_name: frappe-redis-queue
    restart: unless-stopped

  redis-socketio:
    image: redis:7-alpine
    container_name: frappe-redis-socketio
    restart: unless-stopped

  worker-default:
    image: ghcr.io/mehariwamlake/mail:79a17d7c3a12956d4382a496513034d2bba5e42c
    container_name: frappe-worker-default
    restart: unless-stopped

    working_dir: /home/frappe/frappe-bench

    command: bash -lc "bench worker --queue default"

    depends_on:
      - db
      - redis-queue

    volumes:
      - sites:/home/frappe/frappe-bench/sites

  worker-short:
    image: ghcr.io/mehariwamlake/mail:79a17d7c3a12956d4382a496513034d2bba5e42c
    container_name: frappe-worker-short
    restart: unless-stopped

    working_dir: /home/frappe/frappe-bench

    command: bash -lc "bench worker --queue short"

    depends_on:
      - db
      - redis-queue

    volumes:
      - sites:/home/frappe/frappe-bench/sites

  scheduler:
    image: ghcr.io/mehariwamlake/mail:79a17d7c3a12956d4382a496513034d2bba5e42c
    container_name: frappe-scheduler
    restart: unless-stopped

    working_dir: /home/frappe/frappe-bench

    command: bash -lc "bench schedule"

    depends_on:
      - db
      - redis-queue

    volumes:
      - sites:/home/frappe/frappe-bench/sites

volumes:
  sites:
  logs:
  db-data: