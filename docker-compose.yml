version: "3.8"

name: techvision-mail

services:

  # -------------------------
  # DATABASE
  # -------------------------
  mariadb:
    image: mariadb:10.8
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - frappe-net

  # -------------------------
  # REDIS
  # -------------------------
  redis-cache:
    image: redis:7-alpine
    restart: always
    networks:
      - frappe-net

  redis-queue:
    image: redis:7-alpine
    restart: always
    networks:
      - frappe-net

  redis-socketio:
    image: redis:7-alpine
    restart: always
    networks:
      - frappe-net

  # -------------------------
  # INIT (RUNS ONCE)
  # -------------------------
  init:
    image: frappe/erpnext:v16
    restart: "no"
    working_dir: /home/frappe/frappe-bench
    entrypoint: bash
    env_file:
      - .env
    environment:
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379
    command: >
      -c '
      set -e;

      echo "⏳ Waiting for MariaDB...";
      until mysqladmin ping -h mariadb --silent; do
        sleep 2;
      done;

      echo "🔧 Setting Redis";
      bench set-config -g redis_cache "$REDIS_CACHE";
      bench set-config -g redis_queue "$REDIS_QUEUE";
      bench set-config -g redis_socketio "$REDIS_SOCKETIO";

      if [ ! -d sites/mail.techvision.edu.et ]; then
        echo "🚀 Creating site";

        bench new-site mail.techvision.edu.et \
          --db-host mariadb \
          --db-port 3306 \
          --mariadb-root-password "$DB_ROOT_PASSWORD" \
          --admin-password "$ADMIN_PASSWORD" \
          --force;

        bench get-app mail https://github.com/Mehariwamlake/mail.git;
        bench --site mail.techvision.edu.et install-app mail;
        bench use mail.techvision.edu.et
      fi;

      bench --site mail.techvision.edu.et migrate;
      bench --site mail.techvision.edu.et clear-cache;
      bench --site mail.techvision.edu.et clear-website-cache;

      echo "✅ INIT COMPLETE";
      '
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue
      - redis-socketio
    networks:
      - frappe-net

  # -------------------------
  # BACKEND
  # -------------------------
  backend:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: bench serve --port 8000
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      - init
    networks:
      - frappe-net

  # -------------------------
  # SOCKET.IO
  # -------------------------
  socketio:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: node apps/frappe/socketio.js
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
    networks:
      - frappe-net

  # -------------------------
  # WORKERS
  # -------------------------
  worker-default:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: bench worker --queue default
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
    depends_on:
      - backend
    networks:
      - frappe-net

  worker-short:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: bench worker --queue short
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
    depends_on:
      - backend
    networks:
      - frappe-net

  worker-long:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: bench worker --queue long
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
    depends_on:
      - backend
    networks:
      - frappe-net

  # -------------------------
  # SCHEDULER
  # -------------------------
  scheduler:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: bench schedule
    volumes:
      - frappe-bench:/home/frappe/frappe-bench
    depends_on:
      - backend
    networks:
      - frappe-net

# -------------------------
# VOLUMES
# -------------------------
volumes:
  mariadb-data:
  frappe-bench:
  sites:
  logs:

# -------------------------
# NETWORK
# -------------------------
networks:
  frappe-net:
    driver: bridge