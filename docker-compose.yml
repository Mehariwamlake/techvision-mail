version: "3.9"

x-common-image: &common_image
  image: frappe/erpnext:version-15
  pull_policy: always

services:
  init:
    <<: *common_image
    command: >
      bash -c "
      echo '⏳ Waiting for DB...';
      sleep 20;

      if [ ! -d sites/$SITE_NAME ]; then
        echo '🚀 Creating site...';

        bench set-config -g db_host $DB_HOST;
        bench set-config -g redis_cache redis://$REDIS_CACHE;
        bench set-config -g redis_queue redis://$REDIS_QUEUE;
        bench set-config -g redis_socketio redis://$REDIS_SOCKETIO;

        bench new-site $SITE_NAME \
          --admin-password $ADMIN_PASSWORD \
          --mariadb-root-password $MYSQL_ROOT_PASSWORD;

        bench get-app mail;
        bench --site $SITE_NAME install-app mail;

        bench --site $SITE_NAME migrate;
      else
        echo '✅ Site already exists';
      fi
      "
    env_file:
      - .env
    depends_on:
      - mariadb
    volumes:
      - sites:/home/frappe/frappe-bench/sites
  backend:
    <<: *common_image
    command: bench start
    env_file:
      - .env
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue
      - redis-socketio
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  frappe:
    image: frappe/nginx:version-15
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      BACKEND: backend:8000
      SOCKETIO: socketio:9000
      SITE_NAME: ${SITE_NAME}
    volumes:
      - sites:/var/www/html/sites
    labels:
      - traefik.enable=true
      - traefik.http.routers.erp.rule=Host(`${SITE_NAME}`)
      - traefik.http.routers.erp.entrypoints=websecure
      - traefik.http.routers.erp.tls.certresolver=letsencrypt
      - traefik.http.services.erp.loadbalancer.server.port=80

  scheduler:
    <<: *common_image
    command: bench schedule
    env_file:
      - .env
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  worker-default:
    <<: *common_image
    command: bench worker --queue default
    env_file:
      - .env
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  worker-long:
    <<: *common_image
    command: bench worker --queue long
    env_file:
      - .env
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  socketio:
    <<: *common_image
    command: node apps/frappe/socketio.js
    env_file:
      - .env
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  mariadb:
    image: mariadb:10.11
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql

  redis-cache:
    image: redis:7-alpine

  redis-queue:
    image: redis:7-alpine

  redis-socketio:
    image: redis:7-alpine

volumes:
  sites:
  mariadb-data: