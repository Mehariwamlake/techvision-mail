version: "3.8"

services:

  backend:
    image: ghcr.io/mehariwamlake/mail:3face6225ddc72cb7d3a09382de17d0215f41c60
    container_name: frappe-backend
    restart: unless-stopped

    depends_on:
      - db
      - redis-cache
      - redis-queue
      - redis-socketio

    ports:
      - "8000:8000"

    environment:
      SITE_NAME: ${SITE_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_CACHE: ${REDIS_CACHE}
      REDIS_QUEUE: ${REDIS_QUEUE}
      REDIS_SOCKETIO: ${REDIS_SOCKETIO}

    working_dir: /home/frappe/frappe-bench

    command: bench start

    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs


  site-setup:
    image: ${FRAPPE_IMAGE}
    container_name: frappe-site-setup
    restart: "no"

    working_dir: /home/frappe/frappe-bench

    depends_on:
      - db
      - redis-cache
      - redis-queue

    command: bash -lc "
      set -e;

      echo 'Creating site...';

      bench new-site mail.techvision.edu.et \
        --admin-password admin \
        --mariadb-root-password admin \
        --db-host db || true;

      bench --site mail.techvision.edu.et install-app erpnext || true;
      bench --site mail.techvision.edu.et install-app mail || true;

      echo 'DONE';
      "

    volumes:
      - sites:/home/frappe/frappe-bench/sites


  db:
    image: mariadb:10.6
    container_name: frappe-db
    restart: unless-stopped

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-log-bin

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}

    volumes:
      - db-data:/var/lib/mysql


  redis-cache:
    image: redis:7-alpine

  redis-queue:
    image: redis:7-alpine

  redis-socketio:
    image: redis:7-alpine


  worker-default:
    image: ghcr.io/mehariwamlake/mail:3face6225ddc72cb7d3a09382de17d0215f41c60
    command: bench worker --queue default
    working_dir: /home/frappe/frappe-bench
    depends_on:
      - db
      - redis-queue
    volumes:
      - sites:/home/frappe/frappe-bench/sites


  scheduler:
    image: ghcr.io/mehariwamlake/mail:3face6225ddc72cb7d3a09382de17d0215f41c60
    command: bench schedule
    working_dir: /home/frappe/frappe-bench
    depends_on:
      - db
      - redis-queue
    volumes:
      - sites:/home/frappe/frappe-bench/sites


volumes:
  sites:
  logs:
  db-data: