version: "3.8"

services:

  backend:
    image: ${FRAPPE_IMAGE}
    container_name: frappe-backend
    restart: unless-stopped
    depends_on:
      - db
      - redis-cache
      - redis-queue
      - redis-socketio
    ports:
      - "8000:8000"
    environment:
      SITE_NAME: ${SITE_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_CACHE: ${REDIS_CACHE}
      REDIS_QUEUE: ${REDIS_QUEUE}
      REDIS_SOCKETIO: ${REDIS_SOCKETIO}
    working_dir: /home/frappe/frappe-bench
    command: bench start
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs


  site-setup:
    image: ${FRAPPE_IMAGE}
    container_name: frappe-site-setup
    restart: "no"
    working_dir: /home/frappe/frappe-bench

    depends_on:
      - db
      - redis-cache
      - redis-queue

    command: >
      bash -lc "
      set -e;
      echo 'Waiting DB...';
      sleep 20;

      bench new-site ${SITE_NAME}
        --admin-password admin
        --mariadb-root-password ${DB_ROOT_PASSWORD}
        --db-host ${DB_HOST} || true;

      bench --site ${SITE_NAME} install-app erpnext || true;
      bench --site ${SITE_NAME} install-app mail || true;

      echo 'DONE';
      "

    volumes:
      - sites:/home/frappe/frappe-bench/sites


  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-log-bin
    volumes:
      - db-data:/var/lib/mysql


  redis-cache:
    image: redis:7-alpine

  redis-queue:
    image: redis:7-alpine

  redis-socketio:
    image: redis:7-alpine


volumes:
  sites:
  logs:
  db-data: