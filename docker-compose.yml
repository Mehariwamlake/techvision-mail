version: "3.8"

services:

  backend:
    image: ghcr.io/mehariwamlake/mail:d34b2768f3ab2adb84edf8487e201debdb9ddd93
    container_name: frappe-backend
    restart: unless-stopped

    depends_on:
      - db
      - redis-cache
      - redis-queue
      - redis-socketio
      - site-setup

    ports:
      - "8000:8000"

    environment:
      SITE_NAME: mail.techvision.edu.et
      DB_HOST: db
      DB_PORT: 3306
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379

    working_dir: /home/frappe/frappe-bench

    command: bench start

    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs


  site-setup:
    image: ghcr.io/mehariwamlake/mail:d34b2768f3ab2adb84edf8487e201debdb9ddd93
    container_name: frappe-site-setup
    restart: "no"

    working_dir: /home/frappe/frappe-bench

    depends_on:
      - db

    command: bash -lc "
      sleep 20 &&
      bench new-site mail.techvision.edu.et \
        --admin-password admin \
        --mariadb-root-password frappe \
        --db-host db || true &&
      bench --site mail.techvision.edu.et install-app erpnext || true &&
      bench --site mail.techvision.edu.et install-app mail || true
      "

    environment:
      DB_HOST: db

    volumes:
      - sites:/home/frappe/frappe-bench/sites


  db:
    image: mariadb:10.6
    container_name: frappe-db
    restart: unless-stopped

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    environment:
      MYSQL_ROOT_PASSWORD: frappe
      MYSQL_DATABASE: frappe

    volumes:
      - db-data:/var/lib/mysql


  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    container_name: redis-queue
    restart: unless-stopped

  redis-socketio:
    image: redis:7-alpine
    container_name: redis-socketio
    restart: unless-stopped


  worker-default:
    image: ghcr.io/mehariwamlake/mail:d34b2768f3ab2adb84edf8487e201debdb9ddd93
    command: bench worker --queue default
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites


  worker-short:
    image: ghcr.io/mehariwamlake/mail:d34b2768f3ab2adb84edf8487e201debdb9ddd93
    command: bench worker --queue short
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites


  scheduler:
    image: ghcr.io/mehariwamlake/mail:d34b2768f3ab2adb84edf8487e201debdb9ddd93
    command: bench schedule
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites


volumes:
  sites:
  logs:
  db-data: