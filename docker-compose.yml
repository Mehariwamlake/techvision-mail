version: "3.8"

services:
  frappe:
    image: ghcr.io/mehariwamlake/mail:7915f7f3e76ec431af1a35167e932565815e0535
    container_name: frappe-mail-stack
    restart: unless-stopped

    ports:
      - "8000:8000"

    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

    environment:
      - TZ=Africa/Addis_Ababa
      - NODE_ENV=production

volumes:
  sites:
  logs: