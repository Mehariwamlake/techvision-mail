version: "3.8"

services:

  backend:
    image: ghcr.io/mehariwamlake/mail:3face6225ddc72cb7d3a09382de17d0215f41c60
    container_name: frappe-backend
    restart: unless-stopped

    depends_on:
      - db
      - redis-cache
      - redis-queue
      - redis-socketio
      - site-setup

    ports:
      - "8000:8000"

    environment:
      SITE_NAME: mail.techvision.edu.et
      DB_HOST: db
      DB_PORT: 3306
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379

    working_dir: /home/frappe/frappe-bench

    command: >
      /home/frappe/frappe-bench/env/bin/gunicorn frappe.app:application
      --chdir /home/frappe/frappe-bench/sites
      --bind 0.0.0.0:8000
      --workers 2
      --threads 4
      --worker-class gthread
      --timeout 120
      --preload

    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs


  # ----------------------------
  # SITE CREATION (IMPORTANT FIX)
  # ----------------------------
  site-setup:
    image: ghcr.io/mehariwamlake/mail:3face6225ddc72cb7d3a09382de17d0215f41c60
    container_name: frappe-site-setup
    restart: "no"

    working_dir: /home/frappe/frappe-bench

    depends_on:
      - db
      - redis-cache
      - redis-queue

    command: bash -lc "
      set -e

      echo 'Creating site...'

      bench new-site mail.techvision.edu.et \
        --admin-password admin \
        --mariadb-root-password frappe \
        --install-app erpnext || true

      bench --site mail.techvision.edu.et install-app mail || true

      echo 'Site setup complete'
      "

    volumes:
      - sites:/home/frappe/frappe-bench/sites


  db:
    image: mariadb:10.6
    container_name: frappe-db
    restart: unless-stopped

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-log-bin

    environment:
      MYSQL_ROOT_PASSWORD: frappe
      MYSQL_DATABASE: frappe

    volumes:
      - db-data:/var/lib/mysql


  redis-cache:
    image: redis:7-alpine
    container_name: frappe-redis-cache
    restart: unless-stopped


  redis-queue:
    image: redis:7-alpine
    container_name: frappe-redis-queue
    restart: unless-stopped


  redis-socketio:
    image: redis:7-alpine
    container_name: frappe-redis-socketio
    restart: unless-stopped


  worker-default:
    image: ghcr.io/mehariwamlake/mail:3face6225ddc72cb7d3a09382de17d0215f41c60
    container_name: frappe-worker-default
    restart: unless-stopped

    working_dir: /home/frappe/frappe-bench

    command: bench worker --queue default

    depends_on:
      - db
      - redis-queue

    volumes:
      - sites:/home/frappe/frappe-bench/sites


  worker-short:
    image: ghcr.io/mehariwamlake/mail:3face6225ddc72cb7d3a09382de17d0215f41c60
    container_name: frappe-worker-short
    restart: unless-stopped

    working_dir: /home/frappe/frappe-bench

    command: bench worker --queue short

    depends_on:
      - db
      - redis-queue

    volumes:
      - sites:/home/frappe/frappe-bench/sites


  scheduler:
    image: ghcr.io/mehariwamlake/mail:3face6225ddc72cb7d3a09382de17d0215f41c60
    container_name: frappe-scheduler
    restart: unless-stopped

    working_dir: /home/frappe/frappe-bench

    command: bench schedule

    depends_on:
      - db
      - redis-queue

    volumes:
      - sites:/home/frappe/frappe-bench/sites


volumes:
  sites:
  logs:
  db-data: