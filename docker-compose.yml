version: "3.8"

name: techvision-mail

services:

  # -------------------------
  # DATABASE
  # -------------------------
  mariadb:
    image: mariadb:10.8
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - frappe-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -------------------------
  # REDIS
  # -------------------------
  redis-cache:
    image: redis:7-alpine
    restart: always
    networks:
      - frappe-net

  redis-queue:
    image: redis:7-alpine
    restart: always
    networks:
      - frappe-net

  redis-socketio:
    image: redis:7-alpine
    restart: always
    networks:
      - frappe-net

  # -------------------------
  # INIT (SAFE + IDPOTENT)
  # -------------------------
  init:
    image: frappe/erpnext:v16
    restart: "no"
    working_dir: /home/frappe/frappe-bench
    entrypoint: bash
    env_file:
      - .env
    environment:
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379
    command: >
      -c '
      set -e;

      echo "⏳ Waiting for MariaDB...";
      until mysqladmin ping -h mariadb --silent; do sleep 2; done;

      echo "🔧 Configuring Redis";
      bench set-config -g redis_cache redis-cache:6379;
      bench set-config -g redis_queue redis-queue:6379;
      bench set-config -g redis_socketio redis-socketio:6379;

      if ! bench --site mail.techvision.edu.et list-apps >/dev/null 2>&1; then
        echo "🚀 Creating site...";

        bench new-site mail.techvision.edu.et \
          --db-host mariadb \
          --mariadb-root-password "$DB_ROOT_PASSWORD" \
          --admin-password "$ADMIN_PASSWORD";

        echo "📦 Installing Mail app";

        bench get-app mail https://github.com/Mehariwamlake/mail.git || exit 1;
        bench --site mail.techvision.edu.et install-app mail || exit 1;
      else
        echo "✅ Site already exists, skipping creation";
      fi;

      echo "🔄 Migrating...";
      bench --site mail.techvision.edu.et migrate;

      echo "🧹 Clearing cache...";
      bench --site mail.techvision.edu.et clear-cache;
      bench --site mail.techvision.edu.et clear-website-cache;

      echo "✅ INIT DONE";
      '
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - frappe-net

  # -------------------------
  # BACKEND
  # -------------------------
  backend:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: bench serve --port 8000
    ports:
      - "8000:8000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      - init
    networks:
      - frappe-net

  # -------------------------
  # SOCKET.IO
  # -------------------------
  socketio:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: node apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - redis-socketio
    networks:
      - frappe-net

  # -------------------------
  # WORKERS
  # -------------------------
  worker-default:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: bench worker --queue default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
    networks:
      - frappe-net

  worker-short:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: bench worker --queue short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
    networks:
      - frappe-net

  worker-long:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: bench worker --queue long
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
    networks:
      - frappe-net

  # -------------------------
  # SCHEDULER
  # -------------------------
  scheduler:
    image: frappe/erpnext:v16
    restart: always
    working_dir: /home/frappe/frappe-bench
    command: bench schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
    networks:
      - frappe-net

# -------------------------
# VOLUMES
# -------------------------
volumes:
  mariadb-data:
  sites:
  logs:

# -------------------------
# NETWORK
# -------------------------
networks:
  frappe-net:
    driver: bridge